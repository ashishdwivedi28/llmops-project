steps:
  # 1. Build the Docker image with the Backend URL baked in
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - '-t'
      - '$_IMAGE_URI'
      - '.'
  
  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE_URI']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_IMAGE_URI'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_API_URL=$_BACKEND_URL'

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: llmops-frontend-dev
  _IMAGE_URI: us-central1-docker.pkg.dev/search-ahmed/llmops-repo/llmops-frontend:${SHORT_SHA}
  _BACKEND_URL: https://llmops-backend-dev-oxigyhdstq-uc.a.run.app

options:
  machineType: 'E2_HIGHCPU_8'
